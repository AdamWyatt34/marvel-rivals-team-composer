name: Deploy Functions API

on:
  push:
    branches: [ main ]
    paths:
      - 'src/Composer.Core/**'
      - 'src/Composer.Functions/**'
      - '.github/workflows/deploy-functions.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: '9.0.x'
      FUNCTIONAPP_NAME: 'func-rivals-comp-dev' # keep in sync with bicep nameSuffix
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with: { dotnet-version: ${{ env.DOTNET_VERSION }} }

      - name: Restore & Build
        run: |
          dotnet build src/Composer.Core/Composer.Core/Composer.Core.csproj -c Release
          dotnet publish src/Composer.Core/Composer.Functions/Composer.Functions.csproj -c Release -o publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTIONAPP_NAME }}
          package: publish
          publish-profile: ${{ secrets.FUNCTIONS_PUBLISH_PROFILE }}
