name: Deploy Functions API

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: '9.0.x'                  # Functions v4 supports .NET 8
      FUNCTIONAPP_NAME: 'func-rivals-comp-dev' # keep in sync with Bicep

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet restore src/Composer.Core/Composer.Functions/Composer.Functions.csproj

      - name: Build
        run: |
          dotnet build src//Composer.Core/Composer.Functions/Composer.Functions.csproj -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish src//Composer.Core/Composer.Functions/Composer.Functions.csproj -c Release -o publish
          echo "Publish contents:"
          ls -la publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTIONAPP_NAME }}
          package: publish
          publish-profile: ${{ secrets.FUNCTIONS_PUBLISH_PROFILE }}
