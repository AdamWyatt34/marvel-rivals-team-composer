name: Train & Publish Model
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"   # Mon 06:00 UTC

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install pandas numpy scikit-learn lightgbm

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download last 2 months of data
        run: |
          mkdir -p data
          M0=$(date -u '+%Y/%m')
          M1=$(date -u -d '-1 month' '+%Y/%m')
          for M in "$M0" "$M1"; do
            az storage copy \
              --source "https://${{ secrets.AZ_STORAGE_NAME }}.blob.core.windows.net/data/clean/${M}" \
              --destination "./data" \
              --recursive \
              --only-show-errors \
              --auth-mode login || true
          done

      - name: Train GBDT
        env:
          TRAIN_KEEP_DAYS: "60"      # only train on last 60 days if filenames include YYYYMMDD
          PAIR_HASH_DIM: "512"
          POP_BALANCE_ALPHA: "0.15"
        run: |
          python ml/train_gbdt.py $(find data -name "*.csv" | head -n 200)

      - name: Verify model artifacts & capture RUN_ID
        run: |
          set -euo pipefail
          echo "Artifacts tree (out/):"
          find out -maxdepth 2 -type f -printf "%P\n" || true
      
          # Ensure the model exists
          test -s out/latest/gbdt_model.json.gz || {
            echo "❌ No model generated at out/latest/gbdt_model.json.gz. Did training skip due to no CSVs?"
            exit 1
          }
      
          # Read RUN_ID from 'latest/manifest.json' (preferred) or from versioned manifest
          if [ -f out/latest/manifest.json ]; then
            RUN_ID=$(jq -r '.current // .run_id // empty' out/latest/manifest.json)
          fi
          if [ -z "${RUN_ID:-}" ]; then
            # Fallback: read any versioned manifest that has run_id
            RUN_ID=$(jq -r 'select(.run_id)|.run_id' out/*/manifest.json 2>/dev/null | tail -n1 || true)
          fi
      
          if [ -z "${RUN_ID:-}" ] || [ ! -d "out/${RUN_ID}" ]; then
            echo "❌ Could not determine RUN_ID or directory out/${RUN_ID} missing."
            exit 1
          fi
      
          echo "RUN_ID=${RUN_ID}"
          echo "RUN_ID=${RUN_ID}" >> $GITHUB_ENV


      - name: Publish model to Blob (versioned + latest)
        run: |
          set -euo pipefail
          echo "Publishing RUN_ID=$RUN_ID"
          az storage blob upload-batch \
            --account-name "${{ secrets.AZ_STORAGE_NAME }}" \
            --destination models \
            --source "out/${RUN_ID}" \
            --overwrite --only-show-errors

          az storage blob upload \
            --account-name "${{ secrets.AZ_STORAGE_NAME }}" \
            --container-name models \
            --name latest/gbdt_model.json.gz \
            --file out/latest/gbdt_model.json.gz \
            --overwrite --only-show-errors

          az storage blob upload \
            --account-name "${{ secrets.AZ_STORAGE_NAME }}" \
            --container-name models \
            --name latest/manifest.json \
            --file out/latest/manifest.json \
            --overwrite --only-show-errors
