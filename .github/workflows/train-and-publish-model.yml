name: Train & Publish Model
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"   # Mon 06:00 UTC

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install pandas numpy scikit-learn lightgbm

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download recent clean data
        run: |
          mkdir -p data
          az storage blob download-batch \
            --account-name "${{ secrets.AZ_STORAGE_NAME }}" \
            --destination data \
            --source data/clean \
            --auth-mode login \
            --pattern "*.csv" \
            --no-progress || true

      - name: Train GBDT
        env:
          TRAIN_KEEP_DAYS: "60"      # only train on last 60 days if filenames include YYYYMMDD
          PAIR_HASH_DIM: "512"
          POP_BALANCE_ALPHA: "0.15"
        run: |
          python ml/train_gbdt.py $(find data -name "*.csv" | head -n 200)

      - name: Publish model to Blob (versioned + latest)
        run: |
          RUN_ID=$(jq -r '.run_id' out/*/manifest.json | tail -n1)
          echo "RUN_ID=$RUN_ID"
          az storage blob upload-batch \
            --account-name "${{ secrets.AZ_STORAGE_NAME }}" \
            --destination models \
            --source out/$RUN_ID \
            --auth-mode login \
            --overwrite
          # refresh 'latest'
          az storage blob upload \
            --account-name "${{ secrets.AZ_STORAGE_NAME }}" \
            --container-name models \
            --name latest/gbdt_model.json.gz \
            --file out/latest/gbdt_model.json.gz \
            --auth-mode login \
            --overwrite
          az storage blob upload \
            --account-name "${{ secrets.AZ_STORAGE_NAME }}" \
            --container-name models \
            --name latest/manifest.json \
            --file out/latest/manifest.json \
            --auth-mode login \
            --overwrite
