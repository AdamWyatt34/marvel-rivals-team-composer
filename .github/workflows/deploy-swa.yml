name: Deploy Static Web App

on:
  workflow_dispatch: {}
  # push:
  #   branches: [ main ]
  #   paths: [ 'src/web/**', '.github/workflows/deploy-swa.yml' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    env:
      # e.g. func-rivals-comp-dev.azurewebsites.net (NO http/https)
      FUNCTION_HOST: ${{ vars.FUNCTION_HOST }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build static export -> /out
      - name: Install & Build (static export)
        working-directory: src/web
        run: |
          npm ci
          NEXT_TELEMETRY_DISABLED=1 NEXT_DISABLE_SOURCEMAPS=1 npm run build
          test -f out/index.html || (echo "No out/index.html found!" && exit 1)

      # Patch SWA config and copy it into the artifact root (/out)
      - name: Prepare SWA config (patch + copy)
        working-directory: src/web
        run: |
          sed -i "s#__FUNCTION_HOST__#${FUNCTION_HOST}#g" staticwebapp.config.json
          # ensure API calls are not eaten by SPA fallback
          # (your file should already have this block)
          echo "---- Deployed config ----"
          cat staticwebapp.config.json
          cp staticwebapp.config.json out/staticwebapp.config.json
          echo "---- Out folder ----"
          ls -lah out

      # Deploy prebuilt artifact from /out (no Oryx build)
      - name: Deploy SWA (upload exported)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          app_location: "src/web/out"   # deploy straight from the folder that has index.html
          skip_app_build: true
          action: "upload"