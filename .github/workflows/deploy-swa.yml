name: Deploy Static Web App

on:
  workflow_dispatch: {}
  # push:
  #   branches: [ main ]
  #   paths: [ 'src/web/**', '.github/workflows/deploy-swa.yml' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    env:
      # Set this in repo "Variables" (e.g. func-rivals-comp-dev.azurewebsites.net)
      FUNCTION_HOST: ${{ vars.FUNCTION_HOST }}

    steps:
      - uses: actions/checkout@v4

      # Optional but helpful for local tooling steps (e.g., patch + JSON validate)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Patch the SWA config to point /api/* at your Function App
      - name: Patch SWA config with Function host
        run: |
          FILE=src/web/staticwebapp.config.json
          sed -i "s#__FUNCTION_HOST__#${FUNCTION_HOST}#g" "$FILE"
          node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$FILE"

      # Deploy — the SWA Action will build the Next.js app for you
      - name: Install & Build + Export Next.js
        working-directory: src/web
        run: |
          npm ci
          NEXT_TELEMETRY_DISABLED=1 NEXT_DISABLE_SOURCEMAPS=1 npm run build
          npm run export
          ls -lah out
      
      - name: Deploy SWA (upload exported)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          app_location: "src/web"   # where staticwebapp.config.json lives
          output_location: "out"    # exported static folder
          skip_app_build: true
          action: "upload"