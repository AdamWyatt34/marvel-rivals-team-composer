name: Deploy Static Web App

on:
  workflow_dispatch:  # or push: { branches: [main] } if you want auto-deploys

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SWA_NAME: 'swa-rivals-comp-dev'   # from bicep
      FUNCTION_HOST: ${{ vars.FUNCTION_HOST }} # set in repo Variables (func-xxx.azurewebsites.net)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Patch the placeholder JUST ON CI
      - name: Patch SWA config with Function host
        run: |
          FILE=src/web/staticwebapp.config.json
          sed -i "s#__FUNCTION_HOST__#${{ vars.FUNCTION_HOST }}#g" "$FILE"
          # validate JSON to fail fast
          node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$FILE"

      # 1) Install & build Next.js (creates .next)
      - name: Build Next.js
        working-directory: src/web
        run: |
          npm ci
          export NEXT_TELEMETRY_DISABLED=1
          export NEXT_DISABLE_SOURCEMAPS=1
          npm run build
          ls -lah .next || (echo "No .next output!" && exit 1)

      # 2) Package for SWA using the built artifact
      - name: Package with SWA CLI
        working-directory: src/web
        run: |
          npx @azure/static-web-apps-cli build \
            --app-location . \
            --app-artifact-location .next \
            --output-location .swa/build
          echo "Packaged artifact:"
          ls -lah .swa/build || true

      # 3) Upload the prebuilt SWA artifact
      - name: Deploy SWA (upload prebuilt)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          deployment_action: upload
          app_location: "src/web"        # app root (where package.json & staticwebapp.config.json live)
          output_location: ".swa/build"  # relative to app_location
          skip_app_build: true