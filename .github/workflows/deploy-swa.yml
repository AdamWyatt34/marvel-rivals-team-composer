name: Deploy Static Web App

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SWA_NAME: 'swa-rivals-comp-dev'  # from bicep
      FUNCTION_HOST: ${{ vars.FUNCTION_HOST }} # set in repo Variables: e.g., func-rivals-comp-dev.azurewebsites.net
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1) Patch config with Functions host and validate JSON
      - name: Patch SWA config with Function host
        run: |
          FILE=src/web/staticwebapp.config.json
          sed -i "s#__FUNCTION_HOST__#${FUNCTION_HOST}#g" "$FILE"
          node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$FILE"

      # 2) Install deps and prebuild with SWA CLI (produces SSR-ready artifact)
      - name: Build with SWA CLI
        working-directory: src/web
        run: |
          npm ci
          # optional: trim sourcemaps for smaller upload
          export NEXT_DISABLE_SOURCEMAPS=1
          npx @azure/static-web-apps-cli build
          # sanity: list artifact
          echo "Artifact content:"
          ls -lah .swa/build || true

      # 3) Upload the already-built artifact
      - name: Deploy SWA (upload prebuilt)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          deployment_action: upload
          app_location: "src/web/.swa/build"
          skip_app_build: true
