name: Deploy Infra (Bicep)

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: 'Azure Resource Group (must exist or grant sub-level rights to create)'
        required: true
        default: 'rg-rivals-comp'
      location:
        description: 'Azure region'
        required: true
        default: 'eastus'
      appName:
        description: 'Base app name (used in resource names)'
        required: true
        default: 'rivals-comp'
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
      enableOpenAI:
        description: 'Provision Azure OpenAI (true/false)'
        required: true
        default: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: write  # for Actions Variables

    env:
      RG:  ${{ github.event.inputs.resourceGroup }}
      LOC: ${{ github.event.inputs.location }}
      APP: ${{ github.event.inputs.appName }}
      ENV: ${{ github.event.inputs.environment }}
      OPENAI: ${{ github.event.inputs.enableOpenAI }}

    steps:
      - uses: actions/checkout@v4

      # OIDC login (NO client secret). Make sure you created the Entra app + federated credential
      # and set these repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Optional: create the RG. This requires Contributor at subscription scope.
      # If you granted only RG-scope permissions, pre-create the RG and set continue-on-error true here or remove this step.
      - name: Ensure resource group
        continue-on-error: true
        run: |
          az group create -n "$RG" -l "$LOC"

      # Deploy Bicep using the ARM/Bicep GitHub Action (no output-stream quirks)
      - name: Deploy infra with Bicep
        id: deploy
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RG }}
          template: infrastructure/azure/main.bicep
          parameters: >
            location=${{ env.LOC }}
            appName=${{ env.APP }}
            environment=${{ env.ENV }}
            enableOpenAI=${{ env.OPENAI }}

      # The arm-deploy action exposes each Bicep output directly as a step output.
      # Our main.bicep outputs: functionHost, functionName, staticWebAppName, staticWebAppHost,
      # storageAccountName, storageBlobEndpoint, appConfigEndpoint, openAiEndpoint
      - name: Echo outputs
        run: |
          echo "functionHost       = ${{ steps.deploy.outputs.functionHost }}"
          echo "functionName       = ${{ steps.deploy.outputs.functionName }}"
          echo "staticWebAppName   = ${{ steps.deploy.outputs.staticWebAppName }}"
          echo "staticWebAppHost   = ${{ steps.deploy.outputs.staticWebAppHost }}"
          echo "storageAccountName = ${{ steps.deploy.outputs.storageAccountName }}"
          echo "storageBlobEndpoint= ${{ steps.deploy.outputs.storageBlobEndpoint }}"
          echo "appConfigEndpoint  = ${{ steps.deploy.outputs.appConfigEndpoint }}"
          echo "openAiEndpoint     = ${{ steps.deploy.outputs.openAiEndpoint }}"

      - name: Summary
        run: |
          {
            echo "### Infra deployment outputs"
            echo ""
            echo "- Function Host:  \`${{ steps.deploy.outputs.functionHost }}\`"
            echo "- Function Name:  \`${{ steps.deploy.outputs.functionName }}\`"
            echo "- SWA Name:       \`${{ steps.deploy.outputs.staticWebAppName }}\`"
            echo "- SWA Host:       \`${{ steps.deploy.outputs.staticWebAppHost }}\`"
            echo "- Storage Name:   \`${{ steps.deploy.outputs.storageAccountName }}\`"
            echo "- Blob Endpoint:  \`${{ steps.deploy.outputs.storageBlobEndpoint }}\`"
            echo "- AppConfig:      \`${{ steps.deploy.outputs.appConfigEndpoint }}\`"
            echo "- OpenAI:         \`${{ steps.deploy.outputs.openAiEndpoint || 'n/a' }}\`"
          } >> $GITHUB_STEP_SUMMARY
