name: Deploy Infra (Bicep)

on:
  workflow_dispatch:
    inputs:
      resourceGroup:   { description: 'RG name', required: true, default: 'rg-rivals-comp' }
      location:        { description: 'Region',  required: true, default: 'eastus' }
      appName:         { description: 'Base name', required: true, default: 'rivals-comp' }
      environment:     { description: 'env', required: true, default: 'dev' }
      enableOpenAI:    { description: 'true/false', required: true, default: 'true' }

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      RG:      ${{ github.event.inputs.resourceGroup }}
      LOC:     ${{ github.event.inputs.location }}
      APP:     ${{ github.event.inputs.appName }}
      ENV:     ${{ github.event.inputs.environment }}
      OPENAI:  ${{ github.event.inputs.enableOpenAI }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Optional: only if your principal has sub-scope rights;
      # otherwise pre-create the RG once and delete this step.
      - name: Ensure resource group
        continue-on-error: true
        run: az group create -n "$RG" -l "$LOC" -o none

      # 1) Build Bicep -> ARM JSON explicitly (avoids the stream bug)
      - name: Build Bicep to ARM
        run: |
          az bicep version
          az bicep build \
            --file infrastructure/azure/main.bicep \
            --out-file infrastructure/azure/main.compiled.json

      # 2) Deploy the compiled JSON ARM template (no validation pass)
      - name: Deploy ARM (compiled)
        id: deploy
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          subscriptionId:   ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RG }}
          deploymentName:    infra-${{ github.run_id }}
          template: infrastructure/azure/main.compiled.json
          parameters: |
            location=${{ env.LOC }}
            appName=${{ env.APP }}
            environment=${{ env.ENV }}
            enableOpenAI=${{ env.OPENAI }}
          failOnStdErr: false
          additionalArguments: --only-show-errors

      - name: Echo outputs
        run: |
          echo "functionHost       = ${{ steps.deploy.outputs.functionHost }}"
          echo "functionName       = ${{ steps.deploy.outputs.functionName }}"
          echo "staticWebAppName   = ${{ steps.deploy.outputs.staticWebAppName }}"
          echo "staticWebAppHost   = ${{ steps.deploy.outputs.staticWebAppHost }}"
          echo "storageAccountName = ${{ steps.deploy.outputs.storageAccountName }}"
          echo "storageBlobEndpoint= ${{ steps.deploy.outputs.storageBlobEndpoint }}"
          echo "appConfigEndpoint  = ${{ steps.deploy.outputs.appConfigEndpoint }}"
          echo "openAiEndpoint     = ${{ steps.deploy.outputs.openAiEndpoint }}"

      # optional: write outputs as repo Actions Variables for other workflows
      - name: Upsert GitHub Actions Variables
        env:
          GH_TOKEN:                ${{ github.token }}
          REPO:                    ${{ github.repository }}
          FUNCTION_HOST:           ${{ steps.deploy.outputs.functionHost }}
          FUNCTION_NAME:           ${{ steps.deploy.outputs.functionName }}
          SWA_NAME:                ${{ steps.deploy.outputs.staticWebAppName }}
          SWA_HOST:                ${{ steps.deploy.outputs.staticWebAppHost }}
          STORAGE_ACCOUNT_NAME:    ${{ steps.deploy.outputs.storageAccountName }}
          STORAGE_BLOB_ENDPOINT:   ${{ steps.deploy.outputs.storageBlobEndpoint }}
          APPCONFIG_ENDPOINT:      ${{ steps.deploy.outputs.appConfigEndpoint }}
          OPENAI_ENDPOINT:         ${{ steps.deploy.outputs.openAiEndpoint }}
        run: |
          upsert_var () {
            local NAME=$1 VALUE=$2
            if [ -z "$VALUE" ] || [ "$VALUE" = "null" ]; then echo "Skip $NAME"; return 0; fi
            gh api -X PATCH "repos/$REPO/actions/variables/$NAME" -f name="$NAME" -f value="$VALUE" \
              || gh api -X POST "repos/$REPO/actions/variables" -f name="$NAME" -f value="$VALUE"
          }
          upsert_var FUNCTION_HOST "$FUNCTION_HOST"
          upsert_var FUNCTION_NAME "$FUNCTION_NAME"
          upsert_var SWA_NAME "$SWA_NAME"
          upsert_var SWA_HOST "$SWA_HOST"
          upsert_var STORAGE_ACCOUNT_NAME "$STORAGE_ACCOUNT_NAME"
          upsert_var STORAGE_BLOB_ENDPOINT "$STORAGE_BLOB_ENDPOINT"
          upsert_var APPCONFIG_ENDPOINT "$APPCONFIG_ENDPOINT"
          upsert_var OPENAI_ENDPOINT "$OPENAI_ENDPOINT"
